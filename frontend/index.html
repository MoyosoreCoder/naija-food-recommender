<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restaurant-eatery</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js" defer></script>

</head>
<body>
    <header>
        <h1>Welcome, get restaurant😋 recommendation</h1>
    </header>
    <div>
    <form id="recommendationForm">
        <!--food options-->
        <div>
            <select id="selectFood">
                <option value="">Select food or snacks</option>
                <option value="Chicken and Chips">Chicken and Chips</option>
                <option value="Fried Rice and Chicken">Fried Rice and Chicken</option>
                <option value="Refuel Max">Refuel Max</option>
                <option value="Beefy Jollof Rice and Meat">Beefy Jollof Rice and Meat</option>
                <option value="Doughnut">Doughnut</option>
                <option value="Meat Pie">Meat Pie</option>
                <option value="Chicken Pie">Chicken Pie</option>
            </select>
        </div>

        <div>
            <select id="budget">
                <option value="">Choose your budget</option>
                <option value="low">low</option>
                <option value="medium">medium</option>
            </select>
        </div>
        <button type="submit">Get restaurant recommedation</button>
    </form>
    </div>  
</body>
</html>
